<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomz — LAN Synced Audio</title>
  <link rel="stylesheet" href="static/colors.css" />
  <link rel="stylesheet" href="static/_reset.css" />
  <link rel="stylesheet" href="static/base.css" />
  <link rel="stylesheet" href="static/layout.css" />
  <link rel="stylesheet" href="static/components.css" />
</head>
<body>
  <header class="header">
    <div class="nav">
      <nav class="buttons">
        <button type="button" id="btn-menu-library" class="nav-btn">Library</button>
        <button type="button" id="btn-menu-chat" class="nav-btn">Chat</button>
      </nav>
    </div>
    <div class="title">
      <h1>Roomz</h1>
    </div>
    <div class="meta">
      <span id="ws-status" class="ws-status">Connecting…</span>
      <label class="label label--inline">
        <span>Speaker delay (ms)</span>
        <input type="range" id="delay-slider" min="0" max="500" value="0" />
        <span id="delay-value">0</span>
      </label>
    </div>
  </header>

  <main class="main">
    <aside id="panel-library" class="panel panel--library is-hidden">
      <div class="section">
        <h2 class="heading">Library folders</h2>
        <ul id="library-roots" class="library-roots-list"></ul>
        <div class="library-form-row">
          <div>
            <label class="label" for="library-path">Path</label>
            <input type="text" id="library-path" class="input input--path" placeholder="/path/to/music" />
          </div>
          <div>
            <label class="label" for="library-name">Name (optional)</label>
            <input type="text" id="library-name" class="input input--name" placeholder="My Music" />
          </div>
          <button type="button" id="btn-add-library" class="btn">Add folder</button>
        </div>
        <p id="library-error" class="library-error is-hidden"></p>
      </div>
      <div class="section library-actions">
        <input type="file" id="file-input" accept="audio/*" class="input--hidden" multiple />
        <select id="upload-root" class="select select--upload-root"></select>
        <button type="button" id="btn-upload" class="btn">Upload</button>
        <button type="button" id="btn-scan" class="btn">Scan all</button>
      </div>
      <div class="section section--grow">
        <h2 class="heading">All media</h2>
        <div id="library-all-media" class="library-all-media"></div>
      </div>
    </aside>

    <section class="content">
      <div class="now-playing">
        <div id="album-art" class="art">♪</div>
        <div class="info">
          <div id="now-title" class="title">—</div>
          <div id="now-artist" class="artist">—</div>
          <div class="seek">
            <span id="progress-time" class="progress-time">0:00</span>
            <input type="range" id="seek-bar" min="0" max="100" value="0" />
            <span id="remaining-time" class="remaining-time">0:00</span>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="btn-shuffle" type="button" class="btn--icon" title="Shuffle">⇅</button>
        <button id="btn-prev" type="button" class="btn--icon">⏮</button>
        <button id="btn-play" type="button" class="btn--play">▶</button>
        <button id="btn-next" type="button" class="btn--icon">⏭</button>
        <button id="btn-repeat" type="button" class="btn--icon" title="Repeat">↻</button>
      </div>
      <div class="volume">
        <span class="progress-time">Volume</span>
        <input type="range" id="volume-slider" min="0" max="100" value="100" />
      </div>

      <div class="playlist-area">
        <div class="head">
          <h2 class="title">Playlist</h2>
          <button type="button" id="btn-playlist-clear" class="btn">Clear all</button>
        </div>
        <ul id="playlist" class="playlist"></ul>
      </div>
    </section>

    <aside id="panel-chat" class="panel panel--chat is-hidden">
      <div class="section">
        <h2 class="heading">Chat</h2>
      </div>
      <ul id="chat-messages" class="chat-messages"></ul>
      <div class="chat-form">
        <div class="row">
          <input type="text" id="chat-author" class="input" placeholder="Your name…" />
        </div>
        <div class="row">
          <input type="text" id="chat-input" class="input" placeholder="Message…" />
          <button type="button" id="chat-send" class="btn btn--primary">Send</button>
        </div>
      </div>
    </aside>
  </main>

  <script src="static/app.js"></script>
</body>
</html>
